name: Deploy dzencode-test to VPS

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
      VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR }}

    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for secret_name in VPS_HOST VPS_USER VPS_SSH_KEY_B64; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is empty or not configured in repository secrets"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY_B64" | base64 -d > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS via SSH
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="$VPS_PROJECT_DIR"
          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR="/var/www/dzencode-test"
          fi

          ssh -i ~/.ssh/vps_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "PROJECT_DIR='$PROJECT_DIR' REPO_SSH_URL='git@github.com:${{ github.repository }}.git' bash -s" <<'EOF'
              set -euo pipefail

              echo "Prepare project directory"
              if [ ! -d "$PROJECT_DIR/.git" ]; then
                mkdir -p "$(dirname "$PROJECT_DIR")"
                git clone --branch prod "$REPO_SSH_URL" "$PROJECT_DIR"
              fi

              echo "Go to project directory"
              cd "$PROJECT_DIR"

              echo "Allow git operations in this directory"
              git config --global --add safe.directory "$PROJECT_DIR"

              echo "Ensure GitHub SSH remote is configured"
              if git remote get-url origin >/dev/null 2>&1; then
                git remote set-url origin "$REPO_SSH_URL"
              else
                git remote add origin "$REPO_SSH_URL"
              fi

              echo "Pull latest code from prod branch"
              git fetch origin prod
              git reset --hard origin/prod

              echo "Select Docker Compose command"
              if docker compose version >/dev/null 2>&1; then
                COMPOSE_CMD="docker compose"
              else
                COMPOSE_CMD="docker-compose"
              fi

              echo "Stop previous project containers"
              $COMPOSE_CMD down --remove-orphans

              echo "Check host port 80 before starting frontend"
              if command -v ss >/dev/null 2>&1; then
                ss -ltnp '( sport = :80 )' || true
              fi

              PORT_80_CONTAINERS="$(docker ps --format '{{.ID}} {{.Ports}} {{.Names}}' | awk '$0 ~ /0\.0\.0\.0:80->|:::80->/ { print $1 }')"
              if [ -n "$PORT_80_CONTAINERS" ]; then
                echo "Remove Docker containers already publishing host port 80"
                echo "$PORT_80_CONTAINERS" | xargs -r docker rm -f
              fi

              echo "Build and restart Docker Compose services"
              $COMPOSE_CMD up -d --build --remove-orphans
              $COMPOSE_CMD ps

              echo "Configure host nginx reverse proxy"
              if [ "$(id -u)" -eq 0 ]; then
                SUDO=""
              elif command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                SUDO="sudo"
              else
                echo "Root or passwordless sudo is required to configure host nginx"
                exit 1
              fi

              {
                printf '%s\n' 'server {'
                printf '%s\n' '    listen 80;'
                printf '%s\n' '    server_name _;'
                printf '%s\n' ''
                printf '%s\n' '    location / {'
                printf '%s\n' '        proxy_pass http://127.0.0.1:8080;'
                printf '%s\n' '        proxy_http_version 1.1;'
                printf '%s\n' '        proxy_set_header Host $host;'
                printf '%s\n' '        proxy_set_header X-Real-IP $remote_addr;'
                printf '%s\n' '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
                printf '%s\n' '        proxy_set_header X-Forwarded-Proto $scheme;'
                printf '%s\n' '    }'
                printf '%s\n' '}'
              } > /tmp/dzencode-test-nginx.conf

              $SUDO rm -f /etc/nginx/sites-enabled/default /etc/nginx/conf.d/default.conf
              $SUDO install -m 0644 /tmp/dzencode-test-nginx.conf /etc/nginx/conf.d/dzencode-test.conf
              $SUDO nginx -t
              if command -v systemctl >/dev/null 2>&1; then
                $SUDO systemctl reload nginx
              else
                $SUDO nginx -s reload
              fi

              echo "Smoke test deployed app"
              for attempt in 1 2 3 4 5; do
                if curl -fsS http://127.0.0.1/ >/dev/null && curl -fsS http://127.0.0.1/api/orders >/dev/null; then
                  echo "Smoke test passed"
                  break
                fi

                if [ "$attempt" = "5" ]; then
                  echo "Smoke test failed"
                  exit 1
                fi

                echo "App is not ready yet, retry $attempt/5"
                sleep 5
              done

              echo "Prune unused Docker images"
              docker image prune -f

              echo "Deployment completed successfully"
          EOF
